{% extends 'base.html' %}

{% block title %}Page Not Found - GoShort{% endblock %}

{% block content %}
<div class="container-lg py-5 text-center">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div style="font-size: 120px; color: #4F46E5; margin-bottom: 20px;">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h1 class="display-4 fw-bold mb-3">404</h1>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="lead text-muted mb-4">
                Sorry, the page you're looking for doesn't exist or has been moved.
            </p>
            <a href="{% url 'index' %}" class="btn btn-primary btn-lg">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
